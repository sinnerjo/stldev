<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlappyBall</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: system-ui, sans-serif; }
#hud { display: flex; justify-content: space-between; width: 640px; margin-bottom: 8px; font-size: 14px; color: #aaa; }
#score-display { font-weight: 600; color: #fff; }
#controls { display: flex; gap: 8px; align-items: center; }
#tap-hint { font-size: 13px; color: #666; margin-top: 10px; }
#fs-btn {
  background: #ffffff18; border: 1px solid #444; color: #ccc;
  font-size: 13px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
  font-family: system-ui, sans-serif;
}
#fs-btn:hover { background: #ffffff30; color: #fff; }
canvas { border-radius: 12px; border: 1px solid #333; display: block; cursor: pointer; }

/* Fullscreen styles */
:fullscreen body, :-webkit-full-screen body { padding: 0; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; }
:fullscreen #hud, :-webkit-full-screen #hud { width: 100%; max-width: 100vw; padding: 8px 16px; margin-bottom: 0; position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
:fullscreen canvas, :-webkit-full-screen canvas { border-radius: 0; border: none; width: 100vw !important; height: 100vh !important; }
:fullscreen #tap-hint, :-webkit-full-screen #tap-hint { display: none; }
:fullscreen #fs-btn, :-webkit-full-screen #fs-btn { display: none; }
</style>
</head>
<body>
<div id="hud">
  <span id="score-display">Score: 0</span>
  <div id="controls">
    <button id="fs-btn" onclick="toggleFS()">⛶ Fullscreen</button>
    <span id="best-display">Best: 0</span>
  </div>
</div>
<canvas id="canvas" width="640" height="380"></canvas>
<div id="tap-hint">tap / click / spacebar to dribble</div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let W=640,H=380;
const SPEED=3.2,GAP=145,INTERVAL=110,PX=110,GH=40;
const DIFFS={
  easy:   {gravity:0.22,jump:-5.0},
  normal: {gravity:0.32,jump:-6.2},
  hard:   {gravity:0.45,jump:-8.5}
};
let diff='normal',state,player,pipes,score,bests={easy:0,normal:0,hard:0},frame,parts;

// Fullscreen
function toggleFS(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen({navigationUI:'hide'});
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});
  } else {
    if(document.exitFullscreen)document.exitFullscreen();
    else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
  }
}
function onFSChange(){
  const isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
  if(isFS){
    W=window.screen.width; H=window.screen.height;
  } else {
    W=640; H=380;
  }
  canvas.width=W; canvas.height=H;
  // re-clamp player
  if(player) player.y=Math.min(player.y, H-GH-60);
}
document.addEventListener('fullscreenchange',onFSChange);
document.addEventListener('webkitfullscreenchange',onFSChange);

function init(){
  state='idle';player={y:H/2-20,vy:0,angle:0};
  pipes=[];parts=[];score=0;frame=0;
  document.getElementById('score-display').textContent='Score: 0';
  document.getElementById('best-display').textContent='Best: '+bests[diff];
}

function spawnPipe(){
  const t=60+Math.random()*(H-GH-GAP-120);
  pipes.push({x:W+20,topH:t,scored:false,ci:Math.floor(Math.random()*4)});
}

function drawBg(){
  ctx.fillStyle='#2d7a3a';ctx.fillRect(0,0,W,H-GH);
  const offset=(frame*0.8)%64;
  for(let i=0;i<Math.ceil(W/64)+2;i++){
    const x=i*64-offset;
    ctx.fillStyle=i%2?'#338840':'#2d7a3a';
    ctx.fillRect(x,0,64,H-GH);
  }
  ctx.fillStyle='#1a6b28';ctx.fillRect(0,H-GH,W,GH);
  ctx.fillStyle='#ffffff22';ctx.fillRect(0,H-GH,W,2);
  ctx.strokeStyle='#ffffffaa';ctx.lineWidth=1;ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H-GH);ctx.stroke();ctx.setLineDash([]);
}

const JERSEY=['#e63946','#4361ee','#f4a261','#9b2226'];
const HAIR=['#2c1810','#1a1a2e','#c9a66b','#ff6b35'];

// flip=true means top group (heads pointing DOWN toward gap = south)
// We want top defenders heads pointing UP (north), so no flip needed for top
// Bottom defenders: heads pointing UP naturally, which is correct
// The base drawDef draws head at top (-10 to -19), body below
// So for TOP defenders: we want head at BOTTOM (toward gap) = flip
// For BOTTOM defenders: we want head at TOP (toward gap) = flip
// Wait - we want top ones heads-north (away from gap, toward top of screen)
// Base figure: head at y=-10 (top), feet at y=30 (bottom)
// Top group: placed above gap, we want heads pointing UP = no flip
// Bottom group: placed below gap, we want heads pointing UP = flip (mirror vertically)

function drawDef(cx,cy,flipped,ci){
  ctx.save();ctx.translate(cx,cy);
  if(flipped)ctx.scale(1,-1);
  // head
  ctx.fillStyle='#f5cba7';ctx.beginPath();ctx.arc(0,-10,9,0,Math.PI*2);ctx.fill();
  // hair
  ctx.fillStyle=HAIR[ci];ctx.beginPath();ctx.arc(0,-14,9,Math.PI,0);ctx.fill();
  // jersey
  ctx.fillStyle=JERSEY[ci];ctx.fillRect(-11,-2,22,18);
  // shorts
  ctx.fillStyle='#333';ctx.fillRect(-8,16,6,14);ctx.fillRect(2,16,6,14);
  // socks
  ctx.fillStyle='#fff';ctx.fillRect(-8,16,6,4);ctx.fillRect(2,16,6,4);
  // arms
  ctx.fillStyle='#f5cba7';ctx.fillRect(-16,0,5,12);ctx.fillRect(11,0,5,12);
  ctx.restore();
}

function drawPipes(){
  pipes.forEach(p=>{
    const pW=58,y1=p.topH,y2=p.topH+GAP;
    ctx.fillStyle='#fff2';ctx.fillRect(p.x,0,pW,y1);ctx.fillRect(p.x,y2,pW,H-GH-y2);
    ctx.fillStyle='#0003';ctx.fillRect(p.x+1,0,pW,y1);ctx.fillRect(p.x+1,y2,pW,H-GH-y2);
    ctx.strokeStyle='#ffffff55';ctx.lineWidth=1.5;
    ctx.strokeRect(p.x,0,pW,y1);ctx.strokeRect(p.x,y2,pW,H-GH-y2);

    // TOP group: heads pointing north (up), feet toward gap
    // drawDef base has head at top, feet at bottom
    // Place from bottom of top zone upward, no flip: head above, feet below (toward gap) - perfect
    const nT=Math.max(1,Math.floor(y1/55));
    for(let i=0;i<nT;i++){
      const dy=y1-30-i*52; // feet near gap edge, head above
      if(dy>-10)drawDef(p.x+pW/2,dy,false,p.ci);
    }

    // BOTTOM group: heads pointing north (up), feet toward bottom
    // drawDef base: head at top, feet at bottom = head toward gap, feet down
    // That's already correct for bottom group (head up = toward gap for bottom zone)
    const nB=Math.max(1,Math.floor((H-GH-y2)/55));
    for(let i=0;i<nB;i++){
      const dy=y2+14+i*52;
      if(dy<H-GH-10)drawDef(p.x+pW/2,dy,false,p.ci);
    }
  });
}

function drawPlayer(){
  const px=PX,py=player.y;
  ctx.save();ctx.translate(px,py+22);ctx.rotate(player.angle);
  ctx.fillStyle='#0000003a';ctx.beginPath();ctx.ellipse(2,24,14,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f5cba7';ctx.beginPath();ctx.arc(0,-24,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2c1810';ctx.beginPath();ctx.arc(0,-28,10,Math.PI,0);ctx.fill();
  ctx.fillStyle='#1976d2';ctx.fillRect(-10,-14,20,18);
  ctx.fillStyle='#1565c0';ctx.fillRect(-10,-14,20,3);
  ctx.fillStyle='#fff';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.fillText('10',0,-4);
  const ls=Math.sin(frame*0.2)*0.3;
  ctx.fillStyle='#0d47a1';
  ctx.save();ctx.rotate(ls);ctx.fillRect(-9,4,7,16);ctx.restore();
  ctx.save();ctx.rotate(-ls);ctx.fillRect(2,4,7,16);ctx.restore();
  ctx.fillStyle='#fff';
  ctx.save();ctx.rotate(ls);ctx.fillRect(-9,4,7,4);ctx.restore();
  ctx.save();ctx.rotate(-ls);ctx.fillRect(2,4,7,4);ctx.restore();
  ctx.fillStyle='#111';
  ctx.save();ctx.rotate(ls);ctx.beginPath();ctx.ellipse(-5,20,7,4,0.3,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.rotate(-ls);ctx.beginPath();ctx.ellipse(6,20,7,4,-0.3,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.fillStyle='#fff';
  ctx.save();ctx.rotate(ls);ctx.fillRect(-10,-14,4,14);ctx.restore();
  ctx.save();ctx.rotate(-ls);ctx.fillRect(6,-14,4,14);ctx.restore();
  ctx.restore();
  const bs=Math.sin(frame*0.2+1)*10,bx=px+bs,by=py+46;
  ctx.beginPath();ctx.arc(bx,by,8,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='#222';ctx.lineWidth=0.8;ctx.stroke();
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(bx-2,by-2,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bx+3,by+1,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bx-1,by+3,1.5,0,Math.PI*2);ctx.fill();
}

function spawnParts(x,y){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,
      color:['#FFD700','#FF6B6B','#4361ee','#fff'][Math.floor(Math.random()*4)]});
  }
}
function drawParts(){
  parts.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
}

const BTNS=[
  {key:'easy',  label:'Easy',   color:'#27ae60'},
  {key:'normal',label:'Normal', color:'#e67e22'},
  {key:'hard',  label:'Hard',   color:'#e74c3c'}
];
const BW=90,BH=34;
let hoveredBtn=null;

function getBtnX(i){ return W/2-135+i*150; }

function drawOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  if(state==='idle'){
    ctx.fillStyle='#fff';ctx.font='bold 36px system-ui';ctx.fillText('FlappyBall',W/2,H/2-90);
    ctx.font='14px system-ui';ctx.fillStyle='#ccc';
    ctx.fillText('Dribble through the defenders without getting tackled',W/2,H/2-58);
    ctx.font='12px system-ui';ctx.fillStyle='#999';ctx.fillText('difficulty',W/2,H/2-24);
    BTNS.forEach((b,i)=>{
      const sel=diff===b.key,hov=hoveredBtn===b.key,bx=getBtnX(i),by=H/2-12;
      ctx.beginPath();ctx.roundRect(bx,by,BW,BH,8);
      ctx.fillStyle=sel?b.color:hov?b.color+'88':'#ffffff18';ctx.fill();
      if(sel){ctx.strokeStyle=b.color;ctx.lineWidth=2;ctx.stroke();}
      ctx.fillStyle='#fff';ctx.font=(sel?'bold ':'')+'13px system-ui';
      ctx.fillText(b.label,bx+BW/2,by+BH/2+5);
    });
    ctx.fillStyle='#FFD700';ctx.font='bold 15px system-ui';
    ctx.fillText('tap / click / spacebar to start',W/2,H/2+50);
  } else if(state==='dead'){
    ctx.fillStyle='#ff4444';ctx.font='bold 30px system-ui';ctx.fillText('Tackled!',W/2,H/2-55);
    ctx.fillStyle='#fff';ctx.font='20px system-ui';ctx.fillText('Score: '+score,W/2,H/2-18);
    if(score>0&&score>=bests[diff]){ctx.fillStyle='#FFD700';ctx.font='bold 15px system-ui';ctx.fillText('New best!',W/2,H/2+8);}
    ctx.fillStyle='#ccc';ctx.font='14px system-ui';ctx.fillText('tap to try again',W/2,H/2+40);
  }
}

function checkHit(){
  const py=player.y;
  if(py+55>H-GH||py-10<0)return true;
  for(const p of pipes){if(PX+12>p.x&&PX-12<p.x+58){if(py-10<p.topH||py+20>p.topH+GAP)return true;}}
  return false;
}

function doJump(){player.vy=DIFFS[diff].jump;}
function startGame(){state='playing';doJump();}

function handleInput(mx,my,isClick){
  if(state==='idle'){
    const by=H/2-12;
    for(let i=0;i<BTNS.length;i++){
      const bx=getBtnX(i);
      if(mx>=bx&&mx<=bx+BW&&my>=by&&my<=by+BH){
        if(isClick){diff=BTNS[i].key;document.getElementById('best-display').textContent='Best: '+bests[diff];}
        return;
      }
    }
    if(isClick)startGame();
  } else if(state==='playing'&&isClick){
    doJump();
  } else if(state==='dead'&&isClick){
    init();startGame();
  }
}

function getCanvasXY(e){
  const r=canvas.getBoundingClientRect();
  const scaleX=W/r.width, scaleY=H/r.height;
  return [(e.clientX-r.left)*scaleX,(e.clientY-r.top)*scaleY];
}

canvas.addEventListener('click',e=>{const[mx,my]=getCanvasXY(e);handleInput(mx,my,true);});
canvas.addEventListener('mousemove',e=>{
  if(state!=='idle'){hoveredBtn=null;return;}
  const[mx,my]=getCanvasXY(e);
  const by=H/2-12;hoveredBtn=null;
  for(let i=0;i<BTNS.length;i++){const bx=getBtnX(i);if(mx>=bx&&mx<=bx+BW&&my>=by&&my<=by+BH){hoveredBtn=BTNS[i].key;break;}}
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0],r=canvas.getBoundingClientRect();
  const scaleX=W/r.width,scaleY=H/r.height;
  const mx=(t.clientX-r.left)*scaleX,my=(t.clientY-r.top)*scaleY;
  handleInput(mx,my,true);
},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();
    if(state==='idle')startGame();
    else if(state==='playing')doJump();
    else if(state==='dead'){init();startGame();}
  }
  if(e.code==='KeyF')toggleFS();
});

function update(){
  if(state!=='playing')return;frame++;
  player.vy+=DIFFS[diff].gravity;player.y+=player.vy;
  player.angle=Math.max(-0.35,Math.min(0.45,player.vy*0.055));
  if(frame%INTERVAL===0)spawnPipe();
  for(let i=pipes.length-1;i>=0;i--){
    pipes[i].x-=SPEED;
    if(!pipes[i].scored&&pipes[i].x+58<PX){pipes[i].scored=true;score++;document.getElementById('score-display').textContent='Score: '+score;}
    if(pipes[i].x+58<0)pipes.splice(i,1);
  }
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.04;if(p.life<=0)parts.splice(i,1);}
  if(checkHit()){
    spawnParts(PX,player.y+20);
    if(score>bests[diff]){bests[diff]=score;document.getElementById('best-display').textContent='Best: '+bests[diff];}
    state='dead';
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);drawBg();drawPipes();drawParts();drawPlayer();
  if(state==='playing'){
    ctx.fillStyle='#fff';ctx.font='bold 26px system-ui';ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=4;ctx.fillText(score,W/2,42);ctx.shadowBlur=0;
  }
  if(state==='idle'||state==='dead')drawOverlay();
}

function loop(){update();draw();requestAnimationFrame(loop);}
init();loop();
</script>
</body>
</html>
